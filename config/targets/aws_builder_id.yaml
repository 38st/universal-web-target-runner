name: aws_builder_id
profile_prefix: "web_signup_"
output_file: "accounts.jsonl"

steps:
  - action: open_start_page
    url: "https://builder.aws.com/start"

  - action: dismiss_cookies
    accept_xpaths:
      - "//button[text()='Accept']"
      - "//button[contains(text(), 'Accept')]"
      - "//button[@id='awsccc-cb-btn-accept']"
      - "//button[contains(@class, 'awsccc')]"
      - "//div[@id='awsccc-cs-modalcontent']//button[1]"
      - "//button[contains(@class, 'primary')]"

  - action: enter_signup_flow
    texts:
      - "Sign up with Builder ID"
      - "Mit Builder-ID anmelden"
      - "Builder ID"
      - "Builder-ID"
    fallback_css:
      - "a[href*='signup']"
      - "a[href*='register']"
      - ".lb-btn-primary"
      - "button[type='submit']"
    required_text: "Builder ID"

  - action: submit_email
    input_css: 'input[placeholder="username@example.com"]'
    submit_css: '[data-testid="test-primary-button"]'

  - action: submit_name
    input_css: 'input[type="text"]'
    continue_css: '[data-testid="test-primary-button"]'
    continue_xpaths:
      - "//button[contains(., 'Continue')]"
      - "//button[@type='submit']"
    error_xpaths:
      - "//*[contains(text(), 'error processing')]"
      - "//*[contains(text(), 'Error')]"
      - "//*[contains(text(), 'try again')]"
      - "//*[contains(text(), 'Sorry')]"
      - "//*[contains(@class, 'error')]"
      - "//*[contains(@class, 'alert')]"
      - "//div[contains(@role, 'alert')]"
    close_error_xpaths:
      - "//button[contains(@aria-label, 'close')]"
      - "//button[contains(@class, 'close')]"
      - "//button[text()='×']"
      - "//button[text()='OK']"

  - action: fetch_and_submit_otp
    input_css: 'input[placeholder*="digit"], input[type="text"]'
    verify_xpaths:
      - "//button[contains(., 'Verify')]"
      - "//button[contains(., 'Continue')]"
      - "//button[@type='submit']"

  - action: set_password
    input_css: 'input[type="password"]'
    confirm_css:
      - 'input[name="confirmPassword"]'
      - 'input[placeholder="Confirm password"]'
      - 'input[placeholder="Re-enter password"]'
      - 'input[id*="confirm"]'
    submit_xpaths:
      - "//button[contains(., 'Create AWS Builder ID')]"
      - "//button[contains(., 'Continue')]"
      - "//button[@type='submit']"

  - action: detect_result

email:
  sender_contains:
    - "amazon"
    - "aws"
  subject_contains:
    - "verify"
    - "verification"
  body_contains:
    - "amazon"
    - "aws"
    - "verify"

markers:
  blocking_errors:
    - "error processing"
    - "try again"
    - "sorry"
    - "invalid"
    - "incorrect"
    - "expired"
    - "blocked"
    - "too many"
    - "captcha"
    - "verification failed"
  success:
    - "success"
    - "created"
    - "complete"
    - "welcome"
    - "continue to"
    - "builder id is ready"
    - "account created"
